# Local-Postgres-only fallback for fast iteration (see README, Option B).
# Use the Supabase-CLI flow (Option A, `supabase start`) for the recommended primary local-dev path.

services:
  postgres:
    image: postgres:16-alpine
    container_name: bgcf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bgcf
    ports:
      - '5432:5432'
    volumes:
      - bgcf-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d bgcf']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: bgcf-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    environment:
      MP_MAX_MESSAGES: 1000

volumes:
  bgcf-postgres-data:
